<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Study Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>📚 Study Tracker</h1>

    <input type="number" id="hours" placeholder="Enter hours studied">
    <button onclick="addStudy()">Add</button>

    <h3>Total Hours: <span id="total">0</span></h3>
    <h3>🔥 Streak: <span id="streak">0</span> days</h3>

    <ul id="history"></ul>
  </div>

  <script src="script.js"></script>
</body>
</html>
