<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Study Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>📚 Study Tracker</h1>

    <div class="card">
      <input type="number" id="hours" placeholder="Enter hours studied">
      <button onclick="addStudy()">Add</button>
      <button onclick="resetData()">Reset</button>
    </div>

    <div class="stats">
      <div class="box">
        <h2 id="total">0</h2>
        <p>Total Hours</p>
      </div>
      <div class="box">
        <h2 id="streak">0</h2>
        <p>🔥 Streak</p>
      </div>
    </div>

    <ul id="history"></ul>
  </div>

  <script src="script.js"></script>
</body>
</html>
